<!DOCTYPE html>
<html>
<head>
    <title>Minimal BO App</title>
</head>

<body>

<h2>Login</h2>

<div id="loginDiv">
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <select id="auth">
        <option value="secEnterprise">Enterprise</option>
        <option value="secLDAP">LDAP</option>
    </select><br><br>

    <select id="env"></select><br><br>

    <button onclick="login()">Login</button>
    <p id="loginStatus"></p>
</div>

<hr>

<div id="mainSection" style="display:none;">

    <h3>Filters</h3>

    <input type="checkbox" id="pfCheck" onchange="toggleFolder()"> Parent Folder<br><br>

    <select id="folderSelect" disabled></select><br><br>

    <button onclick="fetchData()">Fetch Data</button>

    <br><br>

    <h3>Results</h3>

    <table border="1" id="dataTable">
        <thead>
            <tr>
                <th>#</th>
                <th>SI_ID</th>
                <th>SI_NAME</th>
                <th>SI_PARENTID</th>
                <th>SI_PARENT_FOLDER_CUID</th>
                <th>SI_OWNER</th>
                <th>SI_STARTTIME</th>
                <th>SI_ENDTIME</th>
                <th>SI_CREATION_TIME</th>
                <th>SI_NEXTRUNTIME</th>
                <th>SI_SCHEDULE_STATUS</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>

// ================= INIT =================
window.onload = async () => {

    // Load environments
    const res = await fetch("/envs");
    const data = await res.json();

    data.envs.forEach(e => {
        let o = document.createElement("option");
        o.value = e;
        o.text = e;
        env.appendChild(o);
    });

    // Check session persistence
    const authRes = await fetch("/check-auth", { credentials: "include" });
    const authData = await authRes.json();

    if (authData.authenticated) {
        enableApp();
    }
};

// ================= LOGIN =================
async function login(){

    loginStatus.innerText = "Logging in...";

    const res = await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body: JSON.stringify({
            username: username.value,
            password: password.value,
            auth: auth.value,
            env: env.value
        })
    });

    if(res.ok){
        enableApp();
    } else {
        loginStatus.innerText = "Login failed";
    }
}

// ================= ENABLE APP =================
async function enableApp(){

    loginDiv.style.display = "none";
    mainSection.style.display = "block";

    await loadFolders();
}

// ================= LOGOUT =================
async function logout(){
    await fetch("/logout",{method:"POST"});
    location.reload();
}

// ================= TOGGLE FOLDER =================
function toggleFolder(){
    folderSelect.disabled = !pfCheck.checked;
}

// ================= LOAD FOLDERS =================
async function loadFolders(){

    const res = await fetch("/folders", { credentials: "include" });
    const data = await res.json();

    folderSelect.innerHTML = "";

    data.forEach(f => {
        let o = document.createElement("option");
        o.value = f.cuid;
        o.text = f.name;
        folderSelect.appendChild(o);
    });
}

// ================= FETCH DATA =================
async function fetchData(){

    tableBody.innerHTML = "<tr><td colspan='11'>Loading...</td></tr>";

    const res = await fetch("/sap-data",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body: JSON.stringify({
            parent_folder_enabled: pfCheck.checked,
            folder: folderSelect.value
        })
    });

    const data = await res.json();

    tableBody.innerHTML = "";

    data.data.forEach((obj, index) => {

        tableBody.innerHTML += `
        <tr>
            <td>${index + 1}</td>
            <td>${getVal(obj, "SI_ID")}</td>
            <td>${getVal(obj, "SI_NAME")}</td>
            <td>${getVal(obj, "SI_PARENTID")}</td>
            <td>${getVal(obj, "SI_PARENT_FOLDER_CUID")}</td>
            <td>${getVal(obj, "SI_OWNER")}</td>
            <td>${getVal(obj, "SI_STARTTIME")}</td>
            <td>${getVal(obj, "SI_ENDTIME")}</td>
            <td>${getVal(obj, "SI_CREATION_TIME")}</td>
            <td>${getVal(obj, "SI_NEXTRUNTIME")}</td>
            <td>${getVal(obj, "SI_SCHEDULE_STATUS")}</td>
        </tr>`;
    });
}

// ================= SAFE VALUE =================
function getVal(obj, key){

    const val = obj[key];

    if(val && typeof val === "object" && "value" in val){
        return val.value;
    }

    return val || "";
}

</script>

</body>
</html>
