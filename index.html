<!DOCTYPE html>
<html>
<head>
<title>Instance Manager</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f4f6f9; }
.loader { display:none; text-align:center; }
</style>
</head>

<body class="p-4">

<div class="container">

<!-- LOGIN -->
<div id="loginDiv" class="card p-3 mb-3">
<h5>Login</h5>

<div class="row g-2">
<div class="col"><input class="form-control" id="username" placeholder="Username"></div>
<div class="col"><input class="form-control" id="password" type="password" placeholder="Password"></div>
<div class="col">
<select id="auth" class="form-select">
<option value="secEnterprise">Enterprise</option>
<option value="secLDAP">LDAP</option>
</select>
</div>
<div class="col">
<select id="env" class="form-select"></select>
</div>
<div class="col">
<button class="btn btn-primary w-100" onclick="login()">Login</button>
</div>
</div>

<p id="loginStatus" class="text-danger mt-2"></p>
</div>

<!-- AUTH BAR -->
<div id="authDiv" style="display:none;">
<span class="badge bg-success">Authenticated</span>
<button class="btn btn-sm btn-danger ms-2" onclick="logout()">Logout</button>
</div>

<!-- TABLE -->
<div id="mainSection" style="opacity:0.5;pointer-events:none;">

<div class="loader" id="loader">
<div class="spinner-border text-primary"></div>
</div>

<table class="table table-striped mt-3">
<thead class="table-dark">
<tr>
<th>#</th>
<th>Name</th>
<th>Status</th>
<th>Owner</th>
<th>Location</th>
<th>Completion</th>
<th>Server</th>
<th>Error</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

</div>

<script>

let page = 1;
let loading = false;

// ================= INIT =================
async function loadEnvs(){
    const res = await fetch("/envs");
    const data = await res.json();
    data.envs.forEach(e=>{
        let o=document.createElement("option");
        o.value=e; o.text=e;
        env.appendChild(o);
    });
}

function enable(){
    loginDiv.style.display="none";
    authDiv.style.display="block";
    mainSection.style.opacity=1;
    mainSection.style.pointerEvents="auto";
    loadMore();
}

function disable(){
    loginDiv.style.display="block";
    authDiv.style.display="none";
}

// ================= LOGIN =================
async function login(){
    const res=await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:username.value,
            password:password.value,
            auth:auth.value,
            env:env.value
        })
    });

    res.ok ? enable() : loginStatus.innerText="Login failed";
}

async function logout(){
    await fetch("/logout",{method:"POST"});
    disable();
}

// ================= DATA =================
async function loadMore(){

    if(loading) return;

    loading = true;
    loader.style.display="block";

    const res = await fetch("/sap-data",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({page:page})
    });

    const data = await res.json();

    data.data.forEach(r=>{
        tbody.innerHTML += `
        <tr>
        <td>${r.sr_no}</td>
        <td>${r.instance_name}</td>
        <td>${r.status}</td>
        <td>${r.owner}</td>
        <td>${r.location}</td>
        <td>${r.completion_time}</td>
        <td>${r.server}</td>
        <td>${r.error}</td>
        </tr>`;
    });

    page++;
    loading = false;
    loader.style.display="none";
}

window.onscroll = () => {
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight){
        loadMore();
    }
};

window.onload = loadEnvs;

</script>

</body>
</html>
