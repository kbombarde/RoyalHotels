<!DOCTYPE html>
<html>
<head>
    <title>Authentication Form</title>
</head>
<body>

    <!-- SECTION 1 -->
    <div id="authSection">
        <h2>Authentication</h2>

        <div id="loginForm">
            <input type="text" id="username" placeholder="Username" />

            <input type="password" id="password" placeholder="Password" />

            <select id="authType">
                <option value="Enterprise">Enterprise</option>
                <option value="LDAP">LDAP</option>
            </select>

            <button onclick="login()">Login</button>
        </div>

        <div id="authStatus" style="display:none;">
            <span style="color:green;">●</span>
            Authenticated
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>

    <hr />

    <!-- SECTION 2 -->
    <div id="section2" style="opacity:0.5; pointer-events:none;">
        <h2>Section 2</h2>
        <p>This section becomes active after successful login.</p>
    </div>

    <script>
        const BASE_URL = "http://baseurl:6405";

        // Check token on page load
        window.onload = function () {
            const token = localStorage.getItem("logonToken");

            if (token) {
                setAuthenticatedUI();
            }
        };

        async function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const auth = document.getElementById("authType").value;

            const requestBody = {
                username: username,
                password: password,
                auth: auth
            };

            try {
                const response = await fetch(
                    `${BASE_URL}/biprws/logon/long`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(requestBody)
                    }
                );

                if (!response.ok) {
                    throw new Error("Login Failed");
                }

                const data = await response.json();

                // Assuming API returns token like:
                // { "logonToken": "xxxxxx" }

                const token = data.logonToken;

                if (token) {
                    localStorage.setItem("logonToken", token);
                    setAuthenticatedUI();
                } else {
                    alert("Token not found in response");
                }

            } catch (error) {
                console.error(error);
                alert("Authentication Failed");
            }
        }

        function setAuthenticatedUI() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("authStatus").style.display = "block";

            document.getElementById("section2").style.opacity = "1";
            document.getElementById("section2").style.pointerEvents = "auto";
        }

        function logout() {
            localStorage.removeItem("logonToken");

            document.getElementById("loginForm").style.display = "block";
            document.getElementById("authStatus").style.display = "none";

            document.getElementById("section2").style.opacity = "0.5";
            document.getElementById("section2").style.pointerEvents = "none";
        }
    </script>

</body>
</html>
