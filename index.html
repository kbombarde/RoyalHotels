<!DOCTYPE html>
<html>
<head>
<title>Instance Manager</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f4f6f9; }
.loader { display:none; text-align:center; }
.badge-success { background:#16a34a; }
.badge-failed { background:#dc2626; }
.badge-running { background:#f59e0b; }
</style>
</head>

<body class="p-4">

<div class="container">

<!-- LOGIN -->
<div id="loginDiv" class="card p-3 mb-3">
<div class="row g-2">
<input class="form-control col" id="username" placeholder="Username">
<input class="form-control col" id="password" type="password" placeholder="Password">

<select id="auth" class="form-select col">
<option value="secEnterprise">Enterprise</option>
<option value="secLDAP">LDAP</option>
</select>

<select id="env" class="form-select col"></select>

<button class="btn btn-primary col" onclick="login()">Login</button>
</div>
</div>

<!-- MAIN -->
<div id="mainSection" style="opacity:0.5;pointer-events:none;">

<div class="loader" id="loader">
<div class="spinner-border text-primary"></div>
</div>

<table class="table table-striped mt-3">
<thead class="table-dark">
<tr>
<th>#</th>
<th>Name</th>
<th>Status</th>
<th>Owner</th>
<th>Location</th>
<th>Completion</th>
<th>Server</th>
<th>Error</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

</div>

<script>

let page = 1;
let loading = false;

// ================= LOGIN =================
async function login(){

    const res = await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:username.value,
            password:password.value,
            auth:auth.value,
            env:env.value
        })
    });

    if(res.ok){
        loginDiv.style.display="none";
        mainSection.style.opacity=1;
        mainSection.style.pointerEvents="auto";
        loadMore();
    }
}

// ================= DATA =================
async function loadMore(){

    if(loading) return;

    loading = true;
    loader.style.display="block";

    const res = await fetch("/sap-data",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({page:page})
    });

    const data = await res.json();

    data.data.forEach(r=>{
        tbody.innerHTML += `
        <tr>
        <td>${r.sr_no}</td>
        <td>${r.instance_name}</td>
        <td>${r.status}</td>
        <td>${r.owner}</td>
        <td>${r.location}</td>
        <td>${r.completion_time}</td>
        <td>${r.server}</td>
        <td>${r.error}</td>
        </tr>`;
    });

    page++;
    loading = false;
    loader.style.display="none";
}

// ================= SCROLL =================
window.onscroll = () => {
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight){
        loadMore();
    }
};

// ================= INIT =================
window.onload = async ()=>{
    const res = await fetch("/envs");
    const data = await res.json();
    data.envs.forEach(e=>{
        let o=document.createElement("option");
        o.value=e; o.text=e;
        env.appendChild(o);
    });
};

</script>

</body>
</html>
