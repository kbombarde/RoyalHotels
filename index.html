<!DOCTYPE html>
<html>
<body>

<h3>SAP BO Final Dashboard</h3>

Token: <input id="token" size="80"><br><br>
Folder CUID: <input id="folder"><br><br>

<button onclick="run()">Run</button>

<p id="status"></p>

<h4>Query</h4>
<pre id="query"></pre>

<table border="1">
<thead>
<tr>
<th>si_id</th><th>si_parentid</th><th>si_name</th>
<th>si_kind</th><th>status</th>
<th>owner</th><th>start</th><th>end</th>
<th>next_run</th><th>completion</th>
<th>server</th><th>error</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
async function run() {

    const token = document.getElementById("token").value;
    const folder = document.getElementById("folder").value;

    document.getElementById("status").innerText = "Processing...";

    const res = await fetch("/sap-data", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({token, folder})
    });

    const data = await res.json();

    document.getElementById("query").innerText = data.query;

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.data.forEach(r => {
        tbody.innerHTML += `
        <tr>
        <td>${r.si_id}</td>
        <td>${r.si_parentid}</td>
        <td>${r.si_name}</td>
        <td>${r.si_kind}</td>
        <td>${r.si_schedule_status}</td>
        <td>${r.si_owner}</td>
        <td>${r.si_starttime}</td>
        <td>${r.si_endtime}</td>
        <td>${r.next_run}</td>
        <td>${r.completion}</td>
        <td>${r.si_machine_used}</td>
        <td>${r.si_status_info}</td>
        </tr>`;
    });

    document.getElementById("status").innerText = "Done: " + data.data.length;
}
</script>

</body>
</html>
