<!DOCTYPE html>
<html>
<body>

<h3>SAP BO Debug Dashboard</h3>

Token: <input id="token" size="80"><br><br>
Folder CUID: <input id="folder"><br><br>

<button onclick="run()">Run</button>

<p id="status"></p>

<h4>Query</h4>
<pre id="query"></pre>

<h4>Raw CMS Response</h4>
<pre id="cms"></pre>

<h4>Raw Schedule Response</h4>
<pre id="schedule"></pre>

<table border="1">
<thead>
<tr>
<th>Name</th><th>Type</th><th>Status</th>
<th>Owner</th><th>Folder</th>
<th>Start</th><th>End</th>
<th>Next Run</th><th>Completion</th>
<th>Server</th><th>Error</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
async function run() {

    const token = document.getElementById("token").value;
    const folder = document.getElementById("folder").value;

    document.getElementById("status").innerText = "Processing...";

    const res = await fetch("/sap-data", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({token, folder})
    });

    const data = await res.json();

    document.getElementById("query").innerText = data.query;
    document.getElementById("cms").innerText = JSON.stringify(data.cms_raw_response, null, 2);
    document.getElementById("schedule").innerText = JSON.stringify(data.schedule_api_responses, null, 2);

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.data.forEach(r => {
        tbody.innerHTML += `
        <tr>
        <td>${r.name||""}</td>
        <td>${r.type||""}</td>
        <td>${r.status||""}</td>
        <td>${r.owner||""}</td>
        <td>${r.folder||""}</td>
        <td>${r.start||""}</td>
        <td>${r.end||""}</td>
        <td>${r.next_run||""}</td>
        <td>${r.completion||""}</td>
        <td>${r.server||""}</td>
        <td>${r.error||""}</td>
        </tr>`;
    });

    document.getElementById("status").innerText = "Done";
}
</script>

</body>
</html>
