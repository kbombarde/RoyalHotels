<!DOCTYPE html>
<html>
<head>
    <title>SAP BO Flask</title>
</head>
<body>

<h3>SAP BO (Flask Backend)</h3>

Token:
<input type="text" id="token" size="80"><br><br>

Folder CUID:
<input type="text" id="folder"><br><br>

<button onclick="runQuery()">Run</button>

<p id="status"></p>

<h4>Query</h4>
<pre id="queryBox"></pre>

<table border="1">
<thead>
<tr>
<th>ID</th><th>Name</th><th>Type</th><th>Status</th>
<th>Folder</th><th>Owner</th><th>Start</th><th>End</th>
<th>Server</th><th>Error</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

async function runQuery() {

    const token = document.getElementById("token").value;
    const folder = document.getElementById("folder").value;

    document.getElementById("status").innerText = "Processing...";

    const res = await fetch("/run-query", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({token, folder})
    });

    const result = await res.json();

    document.getElementById("queryBox").innerText = result.query;

    const rows = result.data.entries || [];

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    rows.forEach(r => {
        let tr = "<tr>" +
            `<td>${r.si_id||""}</td>` +
            `<td>${r.si_name||""}</td>` +
            `<td>${r.si_kind||""}</td>` +
            `<td>${r.si_schedule_status||""}</td>` +
            `<td>${r.si_parent_folder_cuid||""}</td>` +
            `<td>${r.si_owner||""}</td>` +
            `<td>${r.si_starttime||""}</td>` +
            `<td>${r.si_endtime||""}</td>` +
            `<td>${r.si_machine_used||""}</td>` +
            `<td>${r.si_status_info||""}</td>` +
        "</tr>";

        tbody.innerHTML += tr;
    });

    document.getElementById("status").innerText = "Done";
}

</script>

</body>
</html>
