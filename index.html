<!DOCTYPE html>
<html>
<body>

<h3>SAP BO Dashboard</h3>

<!-- LOGIN -->
<div id="loginDiv">
Username: <input id="username"><br><br>
Password: <input id="password" type="password"><br><br>
AuthType: <input id="auth" value="secEnterprise"><br><br>

Environment:
<select id="env"></select><br><br>

<button onclick="login()">Login</button>
<p id="loginStatus"></p>
</div>

<!-- AUTH STATUS -->
<div id="authDiv" style="display:none;">
<span style="color:green;">● Authenticated</span>
<span id="envBadge"></span>
<button onclick="logout()">Logout</button>
</div>

<hr>

<!-- MAIN -->
<div id="mainSection" style="opacity:0.5;pointer-events:none;">

Folder:
<select id="folder"></select><br><br>

<button onclick="run()">Run</button>

<p id="status"></p>
<p id="count"></p>

<h4>Query</h4>
<pre id="query"></pre>

<table border="1">
<thead>
<tr>
<th>Sr No</th>
<th>Instance ID</th>
<th>Instance Name</th>
<th>Location</th>
<th>Owner</th>
<th>Completion Time</th>
<th>Next Run Time</th>
<th>Submission Time</th>
<th>Expiry</th>
<th>Server</th>
<th>Error</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script>

// ================= LOAD ENVS =================
async function loadEnvs(){
    const res = await fetch("/envs");
    const data = await res.json();

    env.innerHTML="";
    data.envs.forEach(e=>{
        let o=document.createElement("option");
        o.value=e; o.text=e;
        env.appendChild(o);
    });

    const saved=localStorage.getItem("env");
    if(saved) env.value=saved;
}

// ================= LOAD FOLDERS =================
async function loadFolders(){

    const res = await fetch("/folders");   // 👈 backend endpoint
    const data = await res.json();

    folder.innerHTML="";

    data.forEach(f=>{
        let o=document.createElement("option");
        o.value=f.cuid;      // 👈 IMPORTANT
        o.text=f.name;
        folder.appendChild(o);
    });
}

// ================= ENABLE UI =================
function enable(envVal){
    loginDiv.style.display="none";
    authDiv.style.display="block";
    envBadge.innerText=`[${envVal}]`;

    mainSection.style.opacity=1;
    mainSection.style.pointerEvents="auto";

    loadFolders();  // 👈 load dropdown after login
}

// ================= DISABLE =================
function disable(){
    loginDiv.style.display="block";
    authDiv.style.display="none";

    mainSection.style.opacity=0.5;
    mainSection.style.pointerEvents="none";
}

// ================= CHECK AUTH =================
window.onload=async ()=>{
    await loadEnvs();

    const res=await fetch("/check-auth");
    const d=await res.json();

    d.authenticated?enable(d.env):disable();
};

// ================= LOGIN =================
async function login(){

    status.innerText="Logging in...";

    const res=await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:username.value,
            password:password.value,
            auth:auth.value,
            env:env.value
        })
    });

    if(res.ok){
        localStorage.setItem("env",env.value);
        enable(env.value);
        status.innerText="";
    } else {
        loginStatus.innerText="Login failed";
    }
}

// ================= LOGOUT =================
async function logout(){
    await fetch("/logout",{method:"POST"});
    disable();
}

// ================= RUN =================
async function run(){

    // 🔥 LOADER START
    status.innerText="⏳ Processing... please wait";

    tbody.innerHTML="";
    query.innerText="";
    count.innerText="";

    const res=await fetch("/sap-data",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            folder:folder.value   // 👈 CUID
        })
    });

    const data=await res.json();

    if(!res.ok){
        status.innerText=data.detail;
        return;
    }

    query.innerText=data.query;
    count.innerText="Total Records: "+data.total;

    data.data.forEach(r=>{
        tbody.innerHTML+=`
        <tr>
        <td>${r.sr_no}</td>
        <td>${r.instance_id}</td>
        <td>${r.instance_name}</td>
        <td>${r.location}</td>
        <td>${r.owner}</td>
        <td>${r.completion_time}</td>
        <td>${r.next_run_time}</td>
        <td>${r.submission_time}</td>
        <td>${r.expiry}</td>
        <td>${r.server}</td>
        <td>${r.error}</td>
        </tr>`;
    });

    // 🔥 LOADER END
    status.innerText="✅ Done";
}

</script>

</body>
</html>
